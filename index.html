<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="실시간 위치 추적으로 목적지 도착을 알려주는 PWA 앱. 지도에서 목적지를 설정하면 도착 시 알림을 받을 수 있습니다." />
    <meta name="theme-color" content="#6c63ff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="도착알림" />

    <!-- Open Graph -->
    <meta property="og:title" content="목적지 도착 알림" />
    <meta property="og:description" content="실시간 위치 추적으로 목적지 도착을 알려주는 PWA" />
    <meta property="og:type" content="website" />

    <title>목적지 도착 알림 | Destination Alert</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Leaflet CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      crossorigin=""
    />

    <!-- Apple Touch Icon placeholder (will use generated icon) -->
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app">
      <!-- 지도 컨테이너 -->
      <div id="map-container">
        <div id="map"></div>

        <!-- 주소 검색창 -->
        <div id="search-container" role="search" aria-label="목적지 주소 검색">
          <div id="search-bar">
            <div class="search-input-group">
              <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18" aria-hidden="true">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
              </svg>
              <input
                id="search-input"
                type="search"
                placeholder="목적지 주소 검색..."
                autocomplete="off"
                autocorrect="off"
                spellcheck="false"
                aria-label="목적지 주소 입력"
                aria-autocomplete="list"
                aria-controls="search-results"
              />
              <button id="btn-search-clear" class="search-clear-btn hidden" aria-label="검색어 지우기">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14" height="14">
                  <path d="M18 6L6 18M6 6l12 12"/>
                </svg>
              </button>
            </div>
          </div>
          <div id="search-results" class="hidden" role="listbox" aria-label="검색 결과"></div>
        </div>

        <!-- 지도 위 오버레이 버튼들 -->
        <div id="map-controls">
          <button id="btn-my-location" class="map-btn" title="내 위치로 이동" aria-label="내 위치로 이동">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"/>
              <path d="M12 1v4M12 19v4M1 12h4M19 12h4"/>
              <circle cx="12" cy="12" r="8" stroke-dasharray="2 4"/>
            </svg>
          </button>
          <button id="btn-open-favorites" class="map-btn" title="즐겨찾기" aria-label="즐겨찾기 열기">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
            </svg>
          </button>
          <button id="btn-clear-destination" class="map-btn" title="목적지 초기화" aria-label="목적지 초기화">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 6L6 18M6 6l12 12"/>
            </svg>
          </button>
        </div>

        <!-- 지도 힌트 오버레이 -->
        <div id="map-hint">
          <div class="hint-content">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
              <circle cx="12" cy="10" r="3"/>
            </svg>
            <span>검색하거나 지도를 클릭하여 목적지를 설정하세요</span>
          </div>
        </div>
      </div>

      <!-- 하단 패널 -->
      <div id="bottom-panel">
        <!-- 패널 핸들 -->
        <div id="panel-handle">
          <div class="handle-bar"></div>
        </div>

        <!-- 대시보드 영역 -->
        <div id="dashboard-section">
          <!-- 상태 카드 -->
          <div id="status-card" class="glass-card">
            <div id="status-indicator">
              <div id="status-dot" class="status-dot idle"></div>
              <span id="status-text">추적 대기중</span>
            </div>
            <div id="gps-accuracy">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                <path d="M2 17l10 5 10-5"/>
                <path d="M2 12l10 5 10-5"/>
              </svg>
              <span id="accuracy-text">GPS 대기중</span>
            </div>
          </div>

          <!-- 거리 카드 -->
          <div id="distance-card" class="glass-card">
            <div class="card-label">남은 거리</div>
            <div id="distance-display">
              <span id="distance-value">--</span>
              <span id="distance-unit">m</span>
            </div>
            <div id="distance-bar-container">
              <div id="distance-bar"></div>
            </div>
          </div>

          <!-- 이동 거리 카드 -->
          <div id="traveled-card" class="glass-card traveled-card">
            <div class="card-label">이동 거리</div>
            <div id="traveled-display">
              <span id="traveled-value">--</span>
              <span id="traveled-unit">m</span>
            </div>
            <div class="traveled-legend">
              <span class="legend-solid"></span><span>이동</span>
              <span class="legend-dashed"></span><span>신호 끊김</span>
            </div>
          </div>

          <!-- 목적지 정보 카드 -->
          <div id="destination-card" class="glass-card">
            <div class="destination-card-top">
              <div class="card-label">목적지</div>
              <button id="btn-save-favorite" class="save-fav-btn hidden" title="즐겨찾기에 저장" aria-label="즐겨찾기에 저장">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                  <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                </svg>
                저장
              </button>
            </div>
            <div id="destination-name" class="destination-name">목적지를 지도에서 선택하거나 검색하세요</div>
            <div id="alert-radius-display" class="radius-badge"></div>
          </div>

          <!-- 시작/정지 버튼 -->
          <button id="btn-start-stop" class="primary-btn" disabled>
            <svg id="btn-icon-play" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
              <polygon points="5,3 19,12 5,21"/>
            </svg>
            <svg id="btn-icon-stop" viewBox="0 0 24 24" fill="currentColor" width="20" height="20" style="display:none">
              <rect x="6" y="4" width="4" height="16"/>
              <rect x="14" y="4" width="4" height="16"/>
            </svg>
            <span id="btn-text">목적지를 먼저 설정하세요</span>
          </button>
        </div>

        <!-- 설정 섹션 -->
        <div id="settings-section">
          <button id="settings-toggle" class="section-title section-toggle" aria-expanded="false" aria-controls="settings-body">
            <div class="section-title-left">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.07 4.93l-1.41 1.41M4.93 4.93l1.41 1.41M2 12h2M20 12h2M19.07 19.07l-1.41-1.41M4.93 19.07l1.41-1.41M12 2v2M12 20v2"/>
              </svg>
              환경 설정
            </div>
            <svg id="settings-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16" class="settings-chevron">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </button>
          <div id="settings-body" class="settings-body collapsed">

          <!-- 알림 반경 설정 -->
          <div class="setting-group" id="settings-radius">
            <label class="setting-label">알림 반경</label>
            <div class="chip-group" id="radius-chips">
              <button class="chip" data-value="100">100m</button>
              <button class="chip" data-value="300">300m</button>
              <button class="chip active" data-value="500">500m</button>
              <button class="chip" data-value="1000">1km</button>
            </div>
          </div>

          <!-- 위치 업데이트 주기 -->
          <div class="setting-group" id="settings-interval">
            <label class="setting-label">위치 업데이트 주기</label>
            <div class="chip-group" id="interval-chips">
              <button class="chip" data-value="5000">5초</button>
              <button class="chip active" data-value="10000">10초</button>
              <button class="chip" data-value="30000">30초</button>
            </div>
          </div>

          <!-- 알림 방식 토글 -->
          <div class="setting-group" id="settings-notifications">
            <label class="setting-label">알림 방식</label>
            <div class="toggle-list">
              <div class="toggle-item">
                <div class="toggle-info">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                    <path d="M18 8h1a4 4 0 0 1 0 8h-1"/>
                    <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/>
                    <line x1="6" y1="1" x2="6" y2="4"/>
                    <line x1="10" y1="1" x2="10" y2="4"/>
                    <line x1="14" y1="1" x2="14" y2="4"/>
                  </svg>
                  <span>알림음</span>
                </div>
                <label class="toggle-switch">
                  <input type="checkbox" id="toggle-sound" checked />
                  <span class="toggle-slider"></span>
                </label>
              </div>
              <div class="toggle-item">
                <div class="toggle-info">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                    <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.32C1.6 2.18 2.34 1.18 3.4 1h3a2 2 0 0 1 2 1.72"/>
                  </svg>
                  <span>진동</span>
                </div>
                <label class="toggle-switch">
                  <input type="checkbox" id="toggle-vibration" checked />
                  <span class="toggle-slider"></span>
                </label>
              </div>
              <div class="toggle-item">
                <div class="toggle-info">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                  </svg>
                  <span>푸시 알림</span>
                </div>
                <label class="toggle-switch">
                  <input type="checkbox" id="toggle-push" checked />
                  <span class="toggle-slider"></span>
                </label>
              </div>
            </div>
          </div>

          <!-- 알림 권한 상태 -->
          <div id="notification-permission-status" class="permission-card">
            <div class="permission-info">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
              </svg>
              <span id="permission-text">알림 권한 확인중...</span>
            </div>
            <button id="btn-request-permission" class="secondary-btn" style="display:none">
              권한 요청
            </button>
          </div>

          <!-- 색 테마 설정 -->
          <div class="setting-group" id="settings-theme">
            <label class="setting-label">색 테마</label>
            <div class="theme-grid" id="theme-chips" role="radiogroup" aria-label="색 테마 선택">
              <button class="theme-swatch active" data-theme="violet" title="바이올렛" aria-label="바이올렛" style="--sw: #6c63ff"><span></span></button>
              <button class="theme-swatch" data-theme="ocean" title="오션" aria-label="오션" style="--sw: #0ea5e9"><span></span></button>
              <button class="theme-swatch" data-theme="emerald" title="에메랄드" aria-label="에메랄드" style="--sw: #10b981"><span></span></button>
              <button class="theme-swatch" data-theme="rose" title="로즈" aria-label="로즈" style="--sw: #f43f5e"><span></span></button>
              <button class="theme-swatch" data-theme="amber" title="앰버" aria-label="앰버" style="--sw: #f59e0b"><span></span></button>
              <button class="theme-swatch" data-theme="slate" title="슬레이트" aria-label="슬레이트" style="--sw: #64748b"><span></span></button>
            </div>
          </div>

          </div><!-- /settings-body -->
        </div>
      </div>

      <!-- 즐겨찾기 패널 -->
      <div id="favorites-panel" class="hidden" role="dialog" aria-label="즐겨찾기" aria-modal="true">
        <div id="favorites-panel-inner">
          <div id="favorites-panel-header">
            <h3>즐겨찾기</h3>
            <button id="btn-close-favorites" aria-label="즐겨찾기 닫기">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                <path d="M18 6L6 18M6 6l12 12"/>
              </svg>
            </button>
          </div>
          <div id="favorites-list" role="list"></div>
          <div id="favorites-empty" class="hidden">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="40" height="40">
              <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
            </svg>
            <p>저장된 즐겨찾기가 없습니다.</p>
            <span>목적지를 설정한 후 별 버튼을 눌러 저장해 보세요.</span>
          </div>
        </div>
      </div>

      <!-- 즐겨찾기 저장 모달 -->
      <div id="save-favorite-modal" class="hidden" role="dialog" aria-label="즐겨찾기 저장" aria-modal="true">
        <div id="save-favorite-content">
          <h4>즐겨찾기 저장</h4>
          <div id="save-favorite-address" class="save-fav-address-preview"></div>
          <div class="save-fav-input-group">
            <label for="save-favorite-nickname">별명</label>
            <input
              id="save-favorite-nickname"
              type="text"
              placeholder="별명을 입력하세요 (선택사항)"
              maxlength="30"
              autocomplete="off"
            />
          </div>
          <div class="save-fav-actions">
            <button id="btn-save-favorite-cancel" class="secondary-btn">취소</button>
            <button id="btn-save-favorite-confirm" class="primary-btn">저장</button>
          </div>
        </div>
      </div>

      <!-- 도착 알림 오버레이 -->
      <div id="arrival-overlay" class="hidden">
        <div id="arrival-content">
          <div id="arrival-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="64" height="64">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
              <circle cx="12" cy="10" r="3"/>
            </svg>
          </div>
          <h2 id="arrival-title">목적지 도착!</h2>
          <p id="arrival-message">설정하신 목적지 반경에 도달했습니다.</p>
          <div id="arrival-distance-info"></div>
          <div class="arrival-actions">
            <button id="btn-arrival-continue" class="secondary-btn">계속 추적</button>
            <button id="btn-arrival-stop" class="primary-btn">추적 종료</button>
          </div>
        </div>
      </div>

      <!-- 로딩 스크린 -->
      <div id="loading-screen">
        <div class="loading-content">
          <div class="loading-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="56" height="56">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
              <circle cx="12" cy="10" r="3"/>
            </svg>
          </div>
          <h1>목적지 도착 알림</h1>
          <p>앱을 초기화하는 중...</p>
          <div class="loading-bar">
            <div class="loading-bar-fill"></div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
